<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quick Action Helper</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111318;
  color: #dce2ea;
  font-family: Inter, system-ui, Arial, sans-serif;
  font-size: 14px;
  min-height: 100vh;
  padding: 20px 16px 48px;
}

.app {
  max-width: 980px;
  margin: 0 auto;
}

header {
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid #22273a;
}

h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: #f0f4f8;
}

.subtitle {
  margin-top: 3px;
  font-size: 11px;
  color: #6e7a8a;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

/* Country selector */
.country-selector {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.country-btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 16px;
  background: #1a1e28;
  border: 1px solid #2a3040;
  border-radius: 7px;
  color: #8a94a4;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s, color 0.1s;
}

.country-btn:hover {
  background: #1e2332;
  border-color: #3a4260;
  color: #dce2ea;
}

.country-btn.active {
  background: #1a2540;
  border-color: #3a6abf;
  color: #f0f4f8;
}

.flag { font-size: 17px; line-height: 1; }

/* Cards area */
.cards-area {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
  align-items: start;
}

.empty-msg {
  grid-column: 1 / -1;
  color: #6e7a8a;
  padding: 40px 0;
  text-align: center;
  font-size: 13px;
}

/* Card */
.card {
  background: #1a1e28;
  border: 1px solid #2a3040;
  border-radius: 9px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Card header */
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}

.country-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.flag-lg { font-size: 26px; line-height: 1; }

.card-country {
  font-size: 15px;
  font-weight: 700;
  color: #f0f4f8;
  line-height: 1.2;
}

.card-time {
  font-size: 21px;
  font-weight: 700;
  color: #f0f4f8;
  line-height: 1.1;
  margin-top: 2px;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.status-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
  margin-top: 3px;
}

.status-badge.working {
  background: #0a1f10;
  color: #4ade80;
  border: 1px solid #14532d;
}

.status-badge.outside {
  background: #271800;
  color: #fbbf24;
  border: 1px solid #78350f;
}

/* Section divider */
hr {
  border: none;
  border-top: 1px solid #22273a;
  margin: -2px 0;
}

/* Block label */
.block-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #5a6478;
  margin-bottom: 6px;
}

/* Ops block */
.ops-block {
  background: #14172060;
  border: 1px solid #2a3040;
  border-radius: 7px;
  padding: 11px 12px;
}

.ops-desc {
  font-size: 12px;
  color: #7a8698;
  line-height: 1.45;
  margin-bottom: 9px;
}

/* Buttons */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px 14px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  border: none;
  width: 100%;
  text-align: center;
  letter-spacing: 0.02em;
}

.btn-ops {
  background: #162040;
  color: #7ab4f5;
  border: 1px solid #1e3a70;
}

.btn-ops:hover { background: #1a2a54; }

.btn-call {
  background: #3a0d0d;
  color: #fca5a5;
  border: 1px solid #7f1d1d;
  font-size: 13px;
  letter-spacing: 0.06em;
  margin-top: 9px;
}

.btn-call:hover { background: #4a1111; }

/* Action block */
.action-block {
  border-radius: 7px;
  padding: 11px 12px;
}

.working-action {
  background: #0a1f10;
  border: 1px solid #14532d;
}

.outside-action {
  background: #271800;
  border: 1px solid #78350f;
}

.action-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: #5a6478;
  margin-bottom: 5px;
}

.action-main {
  font-size: 14px;
  font-weight: 700;
}

.working-action .action-main { color: #4ade80; }
.outside-action .action-main { color: #fbbf24; }

/* Instance grid */
.instance-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.instance-block {
  border-radius: 7px;
  padding: 10px;
}

.instance-1 {
  background: #131826;
  border: 1px solid #252e50;
}

.instance-0 {
  background: #1a0808;
  border: 1px solid #5c1010;
}

.instance-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #5a6478;
  margin-bottom: 7px;
}

.timer {
  font-size: 26px;
  font-weight: 700;
  color: #fbbf24;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
  line-height: 1;
}

.timer-done {
  font-size: 11px;
  font-weight: 700;
  color: #f87171;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.instance-note {
  font-size: 11px;
  color: #6e7a8a;
  margin-top: 5px;
  line-height: 1.35;
}

.emergency-text {
  font-size: 14px;
  font-weight: 700;
  color: #fca5a5;
  margin-top: 2px;
}

/* On-call block */
.oncall-block {
  background: #14172060;
  border: 1px solid #2a3040;
  border-radius: 7px;
  padding: 11px 12px;
}

.oncall-name {
  font-size: 15px;
  font-weight: 700;
  color: #f0f4f8;
  margin-top: 2px;
}

/* Stop button */
.btn-stop {
  background: none;
  border: 1px solid #22273a;
  border-radius: 6px;
  color: #4a5568;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 7px;
  cursor: pointer;
  width: 100%;
}

.btn-stop:hover {
  border-color: #7f1d1d;
  color: #f87171;
}

/* Modal */
.modal-back {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.72);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 50;
}

.modal-back.open { display: flex; }

.modal {
  background: #1a1e28;
  border: 1px solid #2a3040;
  border-radius: 9px;
  padding: 20px;
  width: min(380px, 100%);
}

.modal h2 {
  font-size: 16px;
  font-weight: 700;
  color: #f0f4f8;
  margin-bottom: 6px;
}

.modal p {
  color: #7a8698;
  font-size: 13px;
  line-height: 1.45;
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 18px;
}

.btn-cancel {
  background: #1e2332;
  border: 1px solid #2a3040;
  border-radius: 6px;
  color: #7a8698;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 7px 14px;
  cursor: pointer;
}

.btn-danger {
  background: #3a0d0d;
  border: 1px solid #7f1d1d;
  border-radius: 6px;
  color: #fca5a5;
  font-family: inherit;
  font-size: 12px;
  font-weight: 700;
  padding: 7px 14px;
  cursor: pointer;
}

@media (max-width: 580px) {
  .cards-area { grid-template-columns: 1fr; }
  .instance-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Quick Action Helper</h1>
    <p class="subtitle">Fewer Healthy Instances</p>
  </header>
  <section class="country-selector" id="countrySel"></section>
  <section class="cards-area" id="cardsArea"></section>
</div>

<div id="stopModal" class="modal-back">
  <div class="modal">
    <h2>Stop monitoring?</h2>
    <p id="stopText">This will remove the active card.</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelStopBtn">Cancel</button>
      <button class="btn-danger" id="confirmStopBtn">Stop monitoring</button>
    </div>
  </div>
</div>

<script>
const TIMER_DURATION = 180;

const FALLBACK_DATA = {
  AR: {
    name: 'Argentina', flag: '\uD83C\uDDE6\uD83C\uDDF7',
    timezone: 'America/Argentina/Buenos_Aires', workStart: 9, workEnd: 18,
    oncall: { name: 'Alex Ramos', phone: 'tel:+5491100000001' },
    opsChatUrl: 'https://teams.microsoft.com/l/channel/placeholder-ops-ar',
    opsChatLabel: 'OPS Argentina Chat'
  },
  CL: {
    name: 'Chile', flag: '\uD83C\uDDE8\uD83C\uDDF1',
    timezone: 'America/Santiago', workStart: 9, workEnd: 18,
    oncall: { name: 'Camila Torres', phone: 'tel:+56911000001' },
    opsChatUrl: 'https://teams.microsoft.com/l/channel/placeholder-ops-cl',
    opsChatLabel: 'OPS Chile Chat'
  },
  PE: {
    name: 'Peru', flag: '\uD83C\uDDF5\uD83C\uDDEA',
    timezone: 'America/Lima', workStart: 9, workEnd: 18,
    oncall: { name: 'Diego Vargas', phone: 'tel:+51900000001' },
    opsChatUrl: 'https://teams.microsoft.com/l/channel/placeholder-ops-pe',
    opsChatLabel: 'OPS Peru Chat'
  },
  MX: {
    name: 'Mexico', flag: '\uD83C\uDDF2\uD83C\uDDFD',
    timezone: 'America/Mexico_City', workStart: 9, workEnd: 18,
    oncall: { name: 'Sofia Mendez', phone: 'tel:+52550000001' },
    opsChatUrl: 'https://teams.microsoft.com/l/channel/placeholder-ops-mx',
    opsChatLabel: 'OPS Mexico Chat'
  }
};

let countryData = {};
let activeOrder = [];
let active = {};
let pendingStopId = null;

async function loadData() {
  try {
    const res = await fetch('oncall.json');
    if (!res.ok) throw new Error('fetch failed');
    const json = await res.json();
    countryData = json.countries || json;
  } catch (_) {
    countryData = FALLBACK_DATA;
  }
  render();
}

function getLocalTime(timezone) {
  return new Date().toLocaleTimeString('en-US', {
    timeZone: timezone,
    hour: '2-digit',
    minute: '2-digit',
    hour12: false
  });
}

function isWorkingHours(timezone, workStart, workEnd) {
  try {
    const now = new Date();
    const parts = new Intl.DateTimeFormat('en-US', {
      timeZone: timezone,
      weekday: 'short',
      hour: 'numeric',
      hour12: false
    }).formatToParts(now);
    const weekdayPart = parts.find(function(p) { return p.type === 'weekday'; });
    const hourPart = parts.find(function(p) { return p.type === 'hour'; });
    if (!weekdayPart || !hourPart) return false;
    const weekday = weekdayPart.value;
    let hour = parseInt(hourPart.value, 10);
    if (isNaN(hour)) return false;
    if (hour === 24) hour = 0;
    const isWeekday = weekday !== 'Sat' && weekday !== 'Sun';
    return isWeekday && hour >= workStart && hour < workEnd;
  } catch (_) {
    return false;
  }
}

function fmt(s) {
  return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
}

function handleCountry(id) {
  if (active[id]) {
    showStop(id);
    return;
  }
  activeOrder.push(id);
  active[id] = { id: id, timer: TIMER_DURATION };
  render();
}

function showStop(id) {
  pendingStopId = id;
  var c = countryData[id];
  document.getElementById('stopText').textContent =
    'Stop monitoring ' + (c ? c.name : id) + '?';
  document.getElementById('stopModal').classList.add('open');
}

function render() {
  renderCountryButtons();
  renderCards();
}

function renderCountryButtons() {
  var sel = document.getElementById('countrySel');
  sel.innerHTML = Object.keys(countryData).map(function(id) {
    var c = countryData[id];
    var isActive = active[id] ? ' active' : '';
    return '<button class="country-btn' + isActive + '" onclick="handleCountry(\'' + id + '\')">'
      + '<span class="flag">' + c.flag + '</span>'
      + c.name
      + '</button>';
  }).join('');
}

function renderCards() {
  var area = document.getElementById('cardsArea');
  if (!activeOrder.length) {
    area.innerHTML = '<p class="empty-msg">Select a country to begin.</p>';
    return;
  }

  area.innerHTML = activeOrder.map(function(id) {
    var c = countryData[id];
    var a = active[id];
    if (!c || !a) return '';

    var localTime = getLocalTime(c.timezone);
    var working = isWorkingHours(c.timezone, c.workStart, c.workEnd);
    var timerDone = a.timer === 0;
    var badgeClass = working ? 'working' : 'outside';
    var badgeText = working ? 'Working hours' : 'Outside hours';

    var outsideBlocks = working ? '' :
      '<div class="action-block outside-action">'
      + '<div class="action-label">Action — call out procedure</div>'
      + '<div class="action-main">Follow call out procedure</div>'
      + '</div>'
      + '<div class="instance-grid">'
        + '<div class="instance-block instance-1">'
          + '<div class="instance-label">Healthy instances = 1</div>'
          + (timerDone
              ? '<div class="timer-done">Timer ended</div><p class="instance-note">Call on-call if not recovered</p>'
              : '<div class="timer">' + fmt(a.timer) + '</div><p class="instance-note">Monitor — call if not recovered after timer</p>'
            )
        + '</div>'
        + '<div class="instance-block instance-0">'
          + '<div class="instance-label">Healthy instances = 0</div>'
          + '<div class="emergency-text">Call immediately</div>'
        + '</div>'
      + '</div>'
      + '<div class="oncall-block">'
        + '<div class="block-label">On-call today</div>'
        + '<div class="oncall-name">' + c.oncall.name + '</div>'
        + '<a class="btn btn-call" href="' + c.oncall.phone + '">CALL</a>'
      + '</div>';

    var workingBlock = working
      ? '<div class="action-block working-action">'
          + '<div class="action-label">Action</div>'
          + '<div class="action-main">Inform wider team via Ops Chat</div>'
        + '</div>'
      : '';

    return '<article class="card" id="card-' + id + '">'
      + '<div class="card-header">'
        + '<div class="country-info">'
          + '<span class="flag-lg">' + c.flag + '</span>'
          + '<div>'
            + '<div class="card-country">' + c.name + '</div>'
            + '<div class="card-time">' + localTime + '</div>'
          + '</div>'
        + '</div>'
        + '<span class="status-badge ' + badgeClass + '">' + badgeText + '</span>'
      + '</div>'
      + '<div class="ops-block">'
        + '<div class="block-label">Ops Chat</div>'
        + '<p class="ops-desc">Check latest Ops messages — look for planned restart or known issue context before acting.</p>'
        + '<a class="btn btn-ops" href="' + c.opsChatUrl + '" target="_blank" rel="noopener">Open ' + c.opsChatLabel + '</a>'
      + '</div>'
      + workingBlock
      + outsideBlocks
      + '<button class="btn-stop" onclick="showStop(\'' + id + '\')">Stop monitoring</button>'
      + '</article>';
  }).join('');
}

document.getElementById('cancelStopBtn').addEventListener('click', function() {
  document.getElementById('stopModal').classList.remove('open');
  pendingStopId = null;
});

document.getElementById('confirmStopBtn').addEventListener('click', function() {
  if (pendingStopId) {
    activeOrder = activeOrder.filter(function(x) { return x !== pendingStopId; });
    delete active[pendingStopId];
  }
  pendingStopId = null;
  document.getElementById('stopModal').classList.remove('open');
  render();
});

setInterval(function() {
  var changed = false;
  Object.keys(active).forEach(function(id) {
    if (active[id].timer > 0) { active[id].timer--; changed = true; }
  });
  if (changed) render();
}, 1000);

loadData();
</script>
</body>
</html>
